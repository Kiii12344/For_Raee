
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Rachel ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  background:#f8e8e8;
  color:#5e4343;
  overflow-x:hidden;
  transition: all 1.5s ease;
}

body.unlocked{
  background:#fff3f7;
  box-shadow: inset 0 0 200px rgba(255, 120, 160, 0.25);
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px);
  background-size:24px 24px;
  opacity:0.4;
  pointer-events:none;
}

/* LOCK SCREEN */
#lockscreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#ffd6e0,#fff1f5);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  text-align:center;
  padding:20px;
}

#lockscreen h1{
  font-family:'Caveat', cursive;
  font-size:60px;
  color:#d36b8b;
}

#lockscreen input{
  margin-top:20px;
  padding:12px 18px;
  border-radius:20px;
  border:1px solid #ddd;
  outline:none;
  font-size:16px;
  text-align:center;
}

#lockscreen button{
  margin-top:15px;
  padding:12px 22px;
  border:none;
  border-radius:25px;
  background:#ff7aa2;
  color:white;
  cursor:pointer;
}

#loadingText{
  margin-top:15px;
  font-family:'Caveat', cursive;
  font-size:28px;
  color:#c95d83;
  min-height:40px;
}

#error{
  margin-top:10px;
  color:red;
  font-size:14px;
}

/* ENVELOPE OPENING */
#envelope{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(255, 240, 245, 0.95);
  z-index:9998;
  flex-direction:column;
  animation:fadeIn 0.6s ease;
}

.envelope-box{
  width:220px;
  height:160px;
  background:#ffb3c6;
  border-radius:12px;
  position:relative;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  overflow:hidden;
}

.envelope-flap{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ff8fab;
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin:top;
  animation:openFlap 1.2s ease forwards;
}

@keyframes openFlap{
  0%{transform:rotateX(0deg);}
  100%{transform:rotateX(180deg);}
}

.envelope-message{
  position:absolute;
  bottom:-100%;
  width:100%;
  text-align:center;
  font-family:'Caveat', cursive;
  font-size:22px;
  color:white;
  animation:slideUp 1.5s ease forwards 0.8s;
}

@keyframes slideUp{
  to{bottom:30px;}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* HEART BURST */
.heart-burst{
  position:fixed;
  font-size:24px;
  animation:burst 1.2s ease-out forwards;
  z-index:9997;
}

@keyframes burst{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--x), var(--y)) scale(0);opacity:0;}
}

/* MAIN */
.hearts span{
  position:fixed;
  bottom:-50px;
  font-size:22px;
  animation:float 10s linear infinite;
  opacity:0.6;
}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:0.7;}
  100%{transform:translateY(-120vh);opacity:0;}
}

header{
  text-align:center;
  padding:80px 20px 40px;
}

header h1{
  font-family:'Caveat', cursive;
  font-size:82px;
  color:#d36b8b;
}

.container{
  width:92%;
  max-width:1100px;
  margin:auto;
  padding-bottom:100px;
}

.section{
  background:#fffaf8;
  margin:35px 0;
  padding:35px;
  border-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.section h2{
  font-family:'Caveat', cursive;
  font-size:48px;
  margin-bottom:20px;
  color:#c95d83;
}

.album{
  display:flex;
  transition:transform 0.6s ease;
}

.photo-card{
  min-width:100%;
  padding:20px;
}

.polaroid{
  background:white;
  padding:14px 14px 28px;
  border-radius:6px;
  box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

.polaroid img{
  width:100%;
  height:420px;
  object-fit:cover;
}

.caption{
  text-align:center;
  margin-top:16px;
  font-family:'Caveat', cursive;
  font-size:30px;
}

button{
  border:none;
  background:#ff8fab;
  color:white;
  padding:14px 24px;
  border-radius:30px;
  cursor:pointer;
}

button:hover{background:#ff6f91;}

footer{
  text-align:center;
  padding:50px;
  font-family:'Caveat', cursive;
  font-size:34px;
  color:#c25b81;
}

audio{display:none;}

</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockscreen">
  <h1>Hi Rachel 🌸</h1>
  <p>This scrapbook is waiting for you</p>

  <input type="password" id="password" placeholder="Enter password..." />
  <button onclick="checkPassword()">Unlock ❤️</button>

  <div id="loadingText"></div>
  <div id="error"></div>
</div>

<!-- ENVELOPE -->
<div id="envelope">
  <div class="envelope-box">
    <div class="envelope-flap"></div>
    <div class="envelope-message">For you, Rachel ❤️</div>
  </div>
</div>

<!-- HEARTS -->
<div class="hearts">
  <span style="left:10%">❤</span>
  <span style="left:30%; animation-delay:2s">❤</span>
  <span style="left:50%; animation-delay:4s">❤</span>
  <span style="left:70%; animation-delay:1s">❤</span>
  <span style="left:90%; animation-delay:3s">❤</span>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<header>
  <h1>For Rachel 🌸</h1>
</header>

<div class="container">
  <section class="section">
    <h2>Mini Photo Album 📸</h2>

    <div class="album" id="album">
      <div class="photo-card">
        <div class="polaroid">
          <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">
          <div class="caption">your smile stays in my head 💕</div>
        </div>
      </div>

      <div class="photo-card">
        <div class="polaroid">
          <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
          <div class="caption">some moments feel like home 🌷</div>
        </div>
      </div>
    </div>

    <button onclick="nextSlide()">Next →</button>
  </section>
</div>

<footer>made softly for Rachel ♡</footer>

<script>

const loadingText = document.getElementById("loadingText");

function typeText(text, speed=70){
  loadingText.innerHTML = "";
  let i = 0;
  function type(){
    if(i < text.length){
      loadingText.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

function heartBurst(){
  for(let i=0;i<25;i++){
    const h = document.createElement("div");
    h.className="heart-burst";
    h.innerHTML="❤";
    h.style.left="50%";
    h.style.top="50%";
    h.style.setProperty("--x",((Math.random()-0.5)*400)+"px");
    h.style.setProperty("--y",((Math.random()-0.5)*400)+"px");
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

function openEnvelope(cb){
  const env=document.getElementById("envelope");
  env.style.display="flex";
  setTimeout(()=>{
    env.style.display="none";
    cb();
  },1800);
}

function checkPassword(){
  const pass=document.getElementById('password').value;

  if(pass.toLowerCase()==="rachel"){

    typeText("loading feelings...");

    setTimeout(()=>{
      heartBurst();
      document.body.classList.add("unlocked");

      document.getElementById("bgMusic").play();

      openEnvelope(()=>{
        document.getElementById('lockscreen').style.display="none";
      });

    },1800);

  } else {
    document.getElementById('error').innerText="wrong password :(";
    typeText("access denied...");
  }
}

let index=0;
const album=document.getElementById("album");

function nextSlide(){
  index=(index+1)%2;
  album.style.transform=`translateX(-${index*100}%)`;
}

</script>

</body>
</html>
